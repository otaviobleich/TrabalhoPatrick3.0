<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Fluxo Kanban</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🚀 Fluxo DEV → TEST → APROVADO</h1>

<div class="input-area">
    <input type="text" id="tarefa" placeholder="Nova tarefa">
    <button onclick="adicionarTarefa()">Adicionar</button>
</div>

<div class="board">
    <div class="coluna">
        <h2>DEV</h2>
        <ul id="dev"></ul>
    </div>

    <div class="coluna">
        <h2>TESTE</h2>
        <ul id="teste"></ul>
    </div>

    <div class="coluna">
        <h2>APROVADO</h2>
        <ul id="aprovado"></ul>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
